<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>International Asset Holdings Tracking</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;overflow-x:hidden}
body{font-family:Arial,Helvetica,sans-serif;background:#f2f4f7;color:#1f2937}
.top{background:#111827;color:white;padding:22px 14px;text-align:center}
.top h1{margin:0;font-size:21px}
.top p{margin:6px 0 0;color:#d1d5db;font-size:13px}
nav{background:#1f2937;display:flex;justify-content:center;gap:8px;padding:10px}
nav a{color:white;text-decoration:none;font-size:13px;font-weight:bold;padding:8px 10px}
main{padding:14px;max-width:980px;margin:auto}
.search{background:white;border-radius:12px;padding:20px 14px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.search h2{margin:0 0 8px;font-size:24px}
.search p{margin:0 0 16px;color:#555;line-height:1.5}
input{width:100%;padding:16px;border:1px solid #c7c7c7;border-radius:6px;font-size:16px}
button{width:100%;margin-top:10px;padding:16px;background:#c9a227;border:none;border-radius:6px;font-size:16px;font-weight:bold}
.panel{background:white;margin-top:14px;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.08);overflow:hidden}
.panel-head{background:#111827;color:white;padding:16px}
.panel-head h2{margin:0;font-size:22px}
.summary{padding:16px;border-bottom:1px solid #e5e7eb}
.badge{display:inline-block;background:#fff3cd;color:#7a5700;font-weight:bold;border-radius:4px;padding:8px 10px;margin:8px 0}
.summary-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
.sum-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:12px}
.sum-box span{display:block;color:#6b7280;font-size:13px;margin-bottom:4px}
.delivery-card{margin-top:14px;background:#fffaf0;border:1px solid #f1d27a;border-radius:10px;padding:14px}
.delivery-card span{display:block;color:#7a5700;font-size:13px;margin-bottom:4px;font-weight:bold}
.delivery-card b{font-size:18px}
.progress-wrap{padding:18px 16px;border-bottom:1px solid #e5e7eb}
.progress-title{font-weight:bold;margin-bottom:14px}
.progress-bar{position:relative;margin:18px 0 8px;padding:0 4px}
.progress-line{position:absolute;top:18px;left:9%;right:9%;height:5px;background:#d1d5db;border-radius:10px}
.progress-fill{position:absolute;top:18px;left:9%;width:28%;height:5px;background:#c9a227;border-radius:10px}
.steps{display:grid;grid-template-columns:repeat(4,1fr);position:relative;z-index:2}
.step{text-align:center;font-size:11px;color:#6b7280}
.circle{width:38px;height:38px;border-radius:50%;margin:0 auto 7px;background:#d1d5db;color:white;display:flex;align-items:center;justify-content:center;font-weight:bold;border:4px solid white;box-shadow:0 0 0 1px #d1d5db}
.step.done .circle,.step.active .circle{background:#c9a227;box-shadow:0 0 0 1px #c9a227}
.step.done,.step.active{color:#111827;font-weight:bold}
.step.active .circle{animation:pulse 1.6s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(201,162,39,.6)}70%{box-shadow:0 0 0 8px rgba(201,162,39,0)}100%{box-shadow:0 0 0 0 rgba(201,162,39,0)}}
.history{padding:16px}
.history h3{margin:0 0 12px;font-size:20px}
.scan{border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
.row{display:grid;grid-template-columns:95px 1fr;border-bottom:1px solid #e5e7eb}
.row:last-child{border-bottom:none}
.date{background:#f3f4f6;padding:12px;font-weight:bold;font-size:13px;color:#374151}
.details{padding:12px}
.time{font-size:13px;color:#6b7280;margin-bottom:4px}
.activity{font-weight:bold;margin-bottom:5px}
.location{font-size:14px;color:#374151}
.note{font-size:14px;color:#555;margin-top:6px;line-height:1.4}
.error{background:white;margin-top:14px;padding:18px;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
footer{text-align:center;color:#777;font-size:12px;padding:18px}
@media(min-width:720px){
.top h1{font-size:28px}
main{padding:28px}
.search{padding:28px}
.form{display:flex;gap:10px}
button{width:180px;margin-top:0}
.summary-grid{grid-template-columns:repeat(4,1fr)}
.row{grid-template-columns:160px 1fr}
.step{font-size:13px}
}
</style>
</head>
<body>
<div class="top">
<h1>International Asset Holdings</h1>
<p>Secure Asset & Package Tracking</p>
</div>

<nav>
<a href="index.html">Home</a>
<a href="index.html">Track</a>
<a href="contact.html">Contact Us</a>
</nav>

<main>
<section class="search">
<h2>Track Your Shipment</h2>
<p>Enter your tracking number to view the latest shipment status and scan history.</p>
<div class="form">
<input id="tracking" placeholder="Tracking number">
<button onclick="trackPackage()">Track</button>
</div>
</section>

<section id="result"></section>
</main>

<footer>&copy; 2026 International Asset Holdings. All rights reserved.</footer>

<script>
function trackPackage(){
const code=document.getElementById("tracking").value.trim().toUpperCase();
const result=document.getElementById("result");

if(code==="TR599652932"){
result.innerHTML=`
<div class="panel">
  <div class="panel-head">
    <h2>Shipment Tracking</h2>
  </div>

  <div class="summary">
    <p><b>Tracking Number:</b> TR599652932</p>
    <div class="badge">SHIPMENT RECEIVED</div>

    <div class="summary-grid">
      <div class="sum-box"><span>Current Location</span><b>Russia</b></div>
      <div class="sum-box"><span>Shipment Type</span><b>Secure Asset Package</b></div>
      <div class="sum-box"><span>Latest Activity</span><b>Item Scanned</b></div>
      <div class="sum-box"><span>Last Updated</span><b>27 Apr 2026, 12:00 PM</b></div>
    </div>

    <div class="delivery-card">
      <span>Estimated Delivery</span>
      <b>Pending dispatch confirmation</b>
      <p style="margin:8px 0 0;color:#555;line-height:1.4;">Delivery estimate will update once the shipment departs the processing location.</p>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-title">Shipment Progress</div>
    <div class="progress-bar">
      <div class="progress-line"></div>
      <div class="progress-fill"></div>
      <div class="steps">
        <div class="step done"><div class="circle">1</div>Received</div>
        <div class="step active"><div class="circle">2</div>Processing</div>
        <div class="step"><div class="circle">3</div>In Transit</div>
        <div class="step"><div class="circle">4</div>Delivered</div>
      </div>
    </div>
  </div>

  <div class="history">
    <h3>Shipment History</h3>

    <div class="scan">
      <div class="row">
        <div class="date">27 Apr 2026</div>
        <div class="details">
          <div class="time">12:00 PM</div>
          <div class="activity">Item scanned</div>
          <div class="location">Russia</div>
          <div class="note">Shipment was scanned and recorded at the current processing location.</div>
        </div>
      </div>

      <div class="row">
        <div class="date">27 Apr 2026</div>
        <div class="details">
          <div class="time">10:30 AM</div>
          <div class="activity">Item received from shipper</div>
          <div class="location">Russia</div>
          <div class="note">Item was accepted from the shipper for processing.</div>
        </div>
      </div>

      <div class="row">
        <div class="date">27 Apr 2026</div>
        <div class="details">
          <div class="time">10:25 AM</div>
          <div class="activity">Ownership verification completed</div>
          <div class="location">Russia</div>
          <div class="note">Shipment documents and ownership details were reviewed and confirmed.</div>
        </div>
      </div>

      <div class="row">
        <div class="date">27 Apr 2026</div>
        <div class="details">
          <div class="time">09:10 AM</div>
          <div class="activity">Shipment record created</div>
          <div class="location">Russia</div>
          <div class="note">Tracking record was created and assigned to this shipment.</div>
        </div>
      </div>
    </div>
  </div>
</div>`;
}else if(code===""){
result.innerHTML='<div class="error"><b>Please enter a tracking number.</b></div>';
}else{
result.innerHTML='<div class="error"><b>Tracking number not found.</b><br>Please check the number and try again.</div>';
}
}
</script>
</body>
</html>
