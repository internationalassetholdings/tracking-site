<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>International Asset Holdings Tracking</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#f4f6f8;
  color:#222;
}
header{
  background:#111827;
  color:#fff;
  padding:22px 16px;
  text-align:center;
}
header h1{
  margin:0;
  font-size:24px;
  line-height:1.2;
}
header p{
  margin:6px 0 0;
  color:#d1d5db;
  font-size:14px;
}
nav{
  background:#1f2937;
  display:flex;
  justify-content:center;
  gap:8px;
  padding:10px;
  flex-wrap:wrap;
}
nav a{
  color:white;
  text-decoration:none;
  font-weight:bold;
  padding:10px 12px;
  border-radius:6px;
  font-size:14px;
}
nav a:hover{
  background:#374151;
}
main{
  width:100%;
  max-width:900px;
  margin:auto;
  padding:18px 14px;
}
.box,.result{
  background:#fff;
  padding:22px 16px;
  border-radius:16px;
  box-shadow:0 8px 22px rgba(0,0,0,.08);
}
.box{
  text-align:center;
}
.box h2{
  margin-top:0;
  font-size:26px;
}
.box p{
  color:#555;
}
.track-form{
  width:100%;
  max-width:430px;
  margin:20px auto 0;
}
input{
  width:100%;
  padding:16px;
  border:1px solid #bbb;
  border-radius:10px;
  font-size:17px;
  outline:none;
}
input:focus{
  border-color:#c9a227;
}
button{
  width:100%;
  padding:16px;
  background:#c9a227;
  border:none;
  border-radius:10px;
  font-weight:bold;
  font-size:16px;
  margin-top:12px;
  cursor:pointer;
}
button:hover{
  background:#b89222;
}
.result{
  margin-top:18px;
}
.status{
  display:inline-block;
  background:#fff8dc;
  color:#7a5a00;
  padding:8px 14px;
  border-radius:20px;
  font-weight:bold;
}
.info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}
.info-card{
  background:#f9fafb;
  border-left:4px solid #c9a227;
  padding:14px;
  border-radius:10px;
}
.timeline{
  margin-top:24px;
  border-left:3px solid #c9a227;
  padding-left:18px;
}
.event{
  margin-bottom:18px;
  line-height:1.5;
}
.event b{
  display:block;
  color:#111827;
}
footer{
  text-align:center;
  padding:20px 12px;
  color:#777;
  font-size:13px;
}
@media(max-width:650px){
  header h1{font-size:21px}
  .box h2{font-size:24px}
  main{padding:14px 10px}
  .box,.result{padding:20px 14px}
  .info-grid{grid-template-columns:1fr}
  nav a{font-size:13px;padding:9px 10px}
}
</style>
</head>
<body>
<header>
  <h1>International Asset Holdings</h1>
  <p>Secure Asset & Package Tracking</p>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="index.html">Track Shipment</a>
  <a href="contact.html">Contact Us</a>
</nav>

<main>
  <section class="box">
    <h2>Track Your Shipment</h2>
    <p>Enter your tracking number below to view shipment status and history.</p>

    <div class="track-form">
      <input id="tracking" placeholder="Enter tracking number">
      <button onclick="trackPackage()">Track Package</button>
    </div>
  </section>

  <section id="result"></section>
</main>

<footer>&copy; 2026 International Asset Holdings. All rights reserved.</footer>

<script>
function trackPackage(){
  let code=document.getElementById("tracking").value.trim().toUpperCase();
  let result=document.getElementById("result");

  if(code==="TR599652932"){
    result.innerHTML=`
    <div class="result">
      <h2>Tracking History</h2>
      <p><b>Tracking Number:</b> TR599652932</p>
      <p class="status">Shipment Received</p>

      <div class="info-grid">
        <div class="info-card"><b>Current Location</b><br>Russia</div>
        <div class="info-card"><b>Shipment Type</b><br>Secure Asset Package</div>
        <div class="info-card"><b>Carrier Status</b><br>Received by Shipper</div>
        <div class="info-card"><b>Last Updated</b><br>27th Apr 2026 - 12:00 PM</div>
      </div>

      <div class="timeline">
        <h3>Shipment Movement History</h3>
        <div class="event"><b>Shipment Record Created</b>27th Apr 2026 - 09:10 AM</div>
        <div class="event"><b>Ownership Verification Completed</b>27th Apr 2026 - 10:25 AM</div>
        <div class="event"><b>Item received from shipper</b>27th Apr 2026 - 10:30 AM</div>
        <div class="event"><b>Item scanned</b>27th Apr 2026 - 12:00 PM</div>
      </div>
    </div>`;
  }else if(code===""){
    result.innerHTML='<div class="result"><h3>Please enter a tracking number.</h3></div>';
  }else{
    result.innerHTML='<div class="result"><h3>Tracking number not found</h3></div>';
  }
}
</script>
</body>
</html>
