<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>International Asset Holdings Tracking</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;overflow-x:hidden}
body{font-family:Arial,Helvetica,sans-serif;background:#f2f4f7;color:#1f2937}
.top{background:#111827;color:white;padding:22px 14px;text-align:center}
.top h1{margin:0;font-size:21px}
.top p{margin:6px 0 0;color:#d1d5db;font-size:13px}
nav{background:#1f2937;display:flex;justify-content:center;gap:8px;padding:10px}
nav a{color:white;text-decoration:none;font-size:13px;font-weight:bold;padding:8px 10px}
main{padding:14px;max-width:980px;margin:auto}
.search{background:white;border-radius:12px;padding:20px 14px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.search h2{margin:0 0 8px;font-size:24px}
.search p{margin:0 0 16px;color:#555;line-height:1.5}
input{width:100%;padding:16px;border:1px solid #c7c7c7;border-radius:6px;font-size:16px}
button{width:100%;margin-top:10px;padding:16px;background:#c9a227;border:none;border-radius:6px;font-size:16px;font-weight:bold}
.panel{background:white;margin-top:14px;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.08);overflow:hidden}
.panel-head{background:#111827;color:white;padding:16px}
.panel-head h2{margin:0;font-size:22px}
.summary{padding:16px;border-bottom:1px solid #e5e7eb}
.badge{display:inline-block;background:#fff3cd;color:#7a5700;font-weight:bold;border-radius:4px;padding:8px 10px;margin:8px 0}
.summary-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
.sum-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:12px}
.sum-box span{display:block;color:#6b7280;font-size:13px;margin-bottom:4px}
.progress{padding:16px;border-bottom:1px solid #e5e7eb}
.steps{display:flex;align-items:center;justify-content:space-between;gap:4px}
.step{text-align:center;flex:1;font-size:11px;color:#6b7280}
.dot{width:18px;height:18px;border-radius:50%;background:#c9a227;margin:0 auto 6px}
.line{height:4px;background:#c9a227;flex:1;margin-top:-18px}
.history{padding:16px}
.history h3{margin:0 0 12px;font-size:20px}
.scan{border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
.row{display:grid;grid-template-columns:95px 1fr;border-bottom:1px solid #e5e7eb}
.row:last-child{border-bottom:none}
.date{background:#f3f4f6;padding:12px;font-weight:bold;font-size:13px;color:#374151}
.details{padding:12px}
.time{font-size:13px;color:#6b7280;margin-bottom:4px}
.activity{font-weight:bold;margin-bottom:5px}
.location{font-size:14px;color:#374151}
.note{font-size:14px;color:#555;margin-top:6px;line-height:1.4}
.error{background:white;margin-top:14px;padding:18px;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
footer{text-align:center;color:#777;font-size:12px;padding:18px}
@media(min-width:720px){
.top h1{font-size:28px}
main{padding:28px}
.search{padding:28px}
.form{display:flex;gap:10px}
button{width:180px;margin-top:0}
.summary-grid{grid-template-columns:repeat(5,1fr)}
.row{grid-template-columns:160px 1fr}
}

.parties{padding:16px;border-bottom:1px solid #e5e7eb}
.party-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
.party-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:12px;line-height:1.5}
.party-box span{display:block;color:#6b7280;font-size:13px;margin-bottom:4px}
@media(min-width:720px){.party-grid{grid-template-columns:repeat(2,1fr)}}


.route{padding:16px;border-bottom:1px solid #e5e7eb}
.route h3{margin:0 0 14px;font-size:20px}
.route-line{display:grid;grid-template-columns:1fr;gap:10px}
.route-step{background:#f9fafb;border:1px solid #e5e7eb;border-left:4px solid #d1d5db;border-radius:8px;padding:12px;line-height:1.4}
.route-step.done{border-left-color:#c9a227}
.route-step.active{border-left-color:#c9a227;background:#fffaf0}
.route-step span{display:block;color:#6b7280;font-size:13px;margin-top:4px}
@media(min-width:720px){.route-line{grid-template-columns:repeat(5,1fr)}}


/* Compact layout update */
.panel{border-radius:10px}
.panel-head{padding:12px 14px}
.panel-head h2{font-size:20px}
.summary,.progress,.parties,.route,.history{padding:12px 14px}
.summary-grid{gap:8px;margin-top:8px}
.sum-box,.party-box,.route-step{padding:10px;font-size:14px}
.badge{padding:7px 9px;font-size:13px}
.route h3,.history h3,.parties h3{font-size:18px;margin-bottom:10px}
.route-line{gap:7px}
.row{grid-template-columns:82px 1fr}
.date,.details{padding:10px}
.note{margin-top:4px}
@media(min-width:720px){
  .route-line{grid-template-columns:repeat(5,1fr)}
  .row{grid-template-columns:135px 1fr}

.verify{padding:12px 14px;border-bottom:1px solid #e5e7eb}
.verify h3{margin:0 0 10px;font-size:18px}
.verify-grid{display:grid;grid-template-columns:1fr;gap:8px}
.verify-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:10px;font-size:14px}
.verify-box span{display:block;color:#6b7280;font-size:12px;margin-bottom:4px}
@media(min-width:720px){.verify-grid{grid-template-columns:repeat(4,1fr)}}


.route-line{display:grid!important;grid-template-columns:1fr!important;gap:7px!important}
.route-step.done{border-left-color:#c9a227!important;background:#f9fafb!important}
.route-step.active{border-left-color:#c9a227!important;background:#fffaf0!important}
@media(min-width:720px){.route-line{grid-template-columns:repeat(4,1fr)!important}}


.customs-alert {
  background: #ffe5e5;
  border-left: 5px solid red;

  padding: 12px;
  margin-bottom: 15px;

  font-weight: bold;
}

</style>
</head>
