<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>International Asset Holdings Tracking</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f6f8;color:#222}
header{background:#111827;color:#fff;padding:24px;text-align:center}
main{max-width:900px;margin:auto;padding:25px}
.box,.result{background:#fff;padding:28px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
input{padding:14px;width:280px;border:1px solid #ccc;border-radius:8px}
button{padding:14px 22px;background:#c9a227;border:none;border-radius:8px;font-weight:bold;margin-top:10px}
.timeline{margin-top:20px;border-left:3px solid #c9a227;padding-left:18px}
.event{margin-bottom:18px}
footer{text-align:center;padding:20px;color:#777}
</style>
</head>
<body>
<header><h1>International Asset Holdings</h1><p>Secure Asset & Package Tracking</p></header>
<main>
<div class="box">
<h2>Track Your Shipment</h2>
<input id="tracking" placeholder="Enter tracking number"><br>
<button onclick="trackPackage()">Track Package</button>
</div>
<div id="result" style="margin-top:20px;"></div>
</main>
<footer>&copy; 2026 International Asset Holdings</footer>
<script>
function trackPackage(){
let code=document.getElementById("tracking").value.trim().toUpperCase();
let result=document.getElementById("result");

if(code==="TR599652932"){
result.innerHTML=`
<div class="result">
<h2>Tracking History</h2>
<p><b>Tracking Number:</b> TR599652932</p>
<p><b>Status:</b> In Transit</p>
<p><b>Current Location:</b> Processing Facility</p>
<p><b>Estimated Delivery:</b> 25th April 2026</p>
<div class="timeline">
<div class="event"><b>Shipment Record Created</b><br>25 Apr 2026 - 09:10 AM</div>
<div class="event"><b>Ownership Verification Completed</b><br>25 Apr 2026 - 10:25 AM</div>
<div class="event"><b>Prepared For Dispatch</b><br>25 Apr 2026 - 12:40 PM</div>
<div class="event"><b>In Transit</b><br>25 Apr 2026 - 02:15 PM</div>
</div>
</div>`;
}else{
result.innerHTML='<div class="result"><h3>Tracking number not found</h3></div>';
}
}
</script>
</body>
</html>
